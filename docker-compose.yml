services:
  postgres:
    image: postgres:16-alpine
    container_name: fineasy-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-fineasydb}
      POSTGRES_USER: ${DB_USERNAME:-fineasy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fineasy}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-fineasy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fineasy-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fineasy-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-fineasydb}
      DB_USERNAME: ${DB_USERNAME:-fineasy}
      DB_PASSWORD: ${DB_PASSWORD:-fineasy}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set before deployment}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      KIS_APPKEY: ${KIS_APPKEY:-}
      KIS_APPSECRET: ${KIS_APPSECRET:-}
      KIS_ACCOUNT_NUMBER: ${KIS_ACCOUNT_NUMBER:-}
      KIS_ENVIRONMENT: ${KIS_ENVIRONMENT:-prod}
      DATA_PROVIDER_TYPE: ${DATA_PROVIDER_TYPE:-mock}
      ECOS_API_KEY: ${ECOS_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      DART_API_KEY: ${DART_API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      NEWS_COLLECTION_ENABLED: ${NEWS_COLLECTION_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fineasy-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
