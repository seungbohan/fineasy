services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fineasy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-fineasydb}
      POSTGRES_USER: ${DB_USERNAME:-fineasy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fineasy}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-fineasy}"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 200M

  redis:
    image: redis:7-alpine
    container_name: fineasy-redis
    restart: unless-stopped
    command: redis-server --maxmemory 50mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fineasy-backend
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms128m -Xmx220m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication -XX:MaxMetaspaceSize=150m -XX:+UseCompressedOops -Duser.timezone=Asia/Seoul"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-fineasydb}
      DB_USERNAME: ${DB_USERNAME:-fineasy}
      DB_PASSWORD: ${DB_PASSWORD:-fineasy}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      KIS_APPKEY: ${KIS_APPKEY:-}
      KIS_APPSECRET: ${KIS_APPSECRET:-}
      KIS_ACCOUNT_NUMBER: ${KIS_ACCOUNT_NUMBER:-}
      KIS_ENVIRONMENT: ${KIS_ENVIRONMENT:-prod}
      DATA_PROVIDER_TYPE: ${DATA_PROVIDER_TYPE:-mock}
      ECOS_API_KEY: ${ECOS_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      DART_API_KEY: ${DART_API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      NEWS_COLLECTION_ENABLED: ${NEWS_COLLECTION_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 450M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fineasy-frontend
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      INTERNAL_API_URL: http://fineasy-backend:8080/api/v1
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 150M

  nginx:
    image: nginx:alpine
    container_name: fineasy-nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 32M

volumes:
  postgres-data:
  redis-data:
