# Load .env file for API keys
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

# Spring Application
spring.application.name=fineasy-backend
spring.profiles.active=dev

# Server
server.port=8080

# CORS (comma-separated allowed origins)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# JWT Configuration (secret MUST be set via environment variable or .env file)
jwt.secret=${JWT_SECRET:}
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=2592000000

# Actuator (health check & monitoring)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.redis.enabled=false
management.info.env.enabled=true
info.app.name=FinEasy Backend
info.app.version=@project.version@

# SpringDoc OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json

# KIS (Korea Investment & Securities) OpenAPI
kis.api.base-url=https://openapi.koreainvestment.com:9443
kis.api.appkey=${KIS_APPKEY:your-appkey-here}
kis.api.appsecret=${KIS_APPSECRET:your-appsecret-here}
kis.api.account-number=${KIS_ACCOUNT_NUMBER:00000000-00}
kis.api.environment=${KIS_ENVIRONMENT:prod}

# Data provider selection: mock (default) or kis
data-provider.type=${DATA_PROVIDER_TYPE:kis}

# OpenAI Configuration
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}
openai.reasoning-model=${OPENAI_REASONING_MODEL:o4-mini}
openai.base-url=https://api.openai.com/v1
openai.timeout=60s

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.openai.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.openai.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.openai.sliding-window-size=10
resilience4j.circuitbreaker.instances.openai.permitted-number-of-calls-in-half-open-state=3

# Resilience4j Retry
resilience4j.retry.instances.openai.max-attempts=2
resilience4j.retry.instances.openai.wait-duration=1s

# Note: ECOS, FRED, CoinGecko, DART, KIS use Reactor-level retryWhen
# (backoff 2 retries, 1s base delay) since their fault-isolation pattern
# catches exceptions internally. See each *ApiClient class.

# ECOS (Bank of Korea Economic Statistics System) API
ecos.api.key=${ECOS_API_KEY:}
ecos.api.base-url=https://ecos.bok.or.kr/api/StatisticSearch

# FRED (Federal Reserve Economic Data) API
fred.api.key=${FRED_API_KEY:}
fred.api.base-url=https://api.stlouisfed.org/fred

# DART (Financial Supervisory Service) API
dart.api.key=${DART_API_KEY:}
dart.api.base-url=https://opendart.fss.or.kr/api

# News collection
news.rss.urls[0]=https://www.yna.co.kr/rss/economy.xml
news.rss.urls[1]=https://www.hankyung.com/feed/economy
news.rss.urls[2]=https://www.mk.co.kr/rss/30100041/
news.rss.urls[3]=https://www.sedaily.com/RSS/Economy
news.rss.urls[4]=http://feeds.bbci.co.uk/news/business/rss.xml
news.rss.urls[5]=https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=10001147
news.rss.urls[6]=https://finance.yahoo.com/news/rssindex
news.rss.urls[7]=https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=19854910
news.rss.urls[8]=https://www.coindesk.com/arc/outboundfeeds/rss/
news.rss.urls[9]=https://cointelegraph.com/rss
news.rss.collection-enabled=${NEWS_COLLECTION_ENABLED:false}
