spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fineasydb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:fineasy}
spring.datasource.password=${DB_PASSWORD:fineasy}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.data.redis.enabled=${REDIS_ENABLED:true}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

jwt.secret=${JWT_SECRET}

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

logging.level.com.fineasy=INFO
logging.level.org.hibernate.SQL=WARN
